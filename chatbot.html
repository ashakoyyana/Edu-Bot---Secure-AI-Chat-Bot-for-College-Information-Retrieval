<!DOCTYPE html>
<html>
<head>
    <title>College Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="chat-header">
    <div class="chat-left">
        <img src="{{ url_for('static', filename='logo.jpeg') }}" class="chat-logo">
        <span>College AI Assistant</span>
    </div>
    <a href="/logout" class="logout">Logout</a>
</div>

<div class="chat-area" id="chatBox"></div>

<div class="input-section">
    <input type="text" id="userInput" placeholder="Ask college related questions only..." />
    <button onclick="sendMessage()">Send</button>
</div>

<script>
function sendMessage() {

    const input = document.getElementById("userInput");
    const message = input.value.trim();
    if (!message) return;

    const chatBox = document.getElementById("chatBox");

    // User bubble
    const userDiv = document.createElement("div");
    userDiv.className = "user-msg";
    userDiv.innerText = message;
    chatBox.appendChild(userDiv);

    input.value = "";

    // Bot loading
    const botDiv = document.createElement("div");
    botDiv.className = "bot-msg";
    botDiv.innerText = "Searching...";
    chatBox.appendChild(botDiv);

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: message})
    })
    .then(res => res.json())
    .then(data => {
        botDiv.innerText = data.response;
        chatBox.scrollTop = chatBox.scrollHeight;
    })
    .catch(err => {
        botDiv.innerText = "Server Error.";
    });
}

document.getElementById("userInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
